name: Deploy VitePress site to Pages

on:
  push:
    branches: [master] # 改成你实际的主分支名

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 和你本地版本一致
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 和你本地版本一致

      - name: Install dependencies
        run: pnpm install

      - name: Build VitePress site
        run: pnpm run docs:build # 和你 package.json 里的脚本对应

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.vitepress/dist # 适配你根目录的构建产物路径

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
